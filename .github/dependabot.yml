version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Keep in sync with minimumReleaseAge (1440 min = 1 day) in pnpm-workspace.yaml
    # so Dependabot never proposes a version pnpm's resolver refuses as too new.
    cooldown:
      default-days: 1
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
