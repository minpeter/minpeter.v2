# 1440 matches the pnpm 11 default VALUE, but configuring it explicitly is
# load-bearing: together with minimumReleaseAgeStrict it makes pnpm FAIL
# resolution on too-new versions instead of silently falling back to them.
# Keep in sync with cooldown.default-days in .github/dependabot.yml
# (1440 min = 1 day).
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
trustPolicy: no-downgrade

overrides:
  # Next.js exact-pins postcss@8.4.31, which is vulnerable to
  # GHSA-qx2v-qp2m-jg93 (XSS via unescaped </style>, patched in 8.5.10).
  # Range override so future postcss patches still flow; drop once Next's
  # own pin reaches >=8.5.10.
  "next>postcss": "^8.5.16"
peerDependencyRules:
  allowedVersions:
    # tsconfck (via vite-tsconfig-paths) declares typescript ^5 but works with
    # the TypeScript 6 this repo uses; silence the unmet-peer warning.
    "tsconfck>typescript": "^6.0.0"

allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  sharp: true
